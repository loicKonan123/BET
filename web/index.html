<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BET — Ticket du jour</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0d1117; color: #e6edf3; line-height: 1.5;
      padding: 24px; max-width: 900px; margin: 0 auto;
    }
    h1 { font-size: 1.6rem; margin-bottom: 4px; }
    .sub { color: #8b949e; font-size: .9rem; margin-bottom: 20px; }
    .controls {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: end;
      background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      padding: 16px; margin-bottom: 18px;
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: .78rem; color: #8b949e; }
    select, input[type=date] {
      background: #0d1117; color: #e6edf3; border: 1px solid #30363d;
      border-radius: 8px; padding: 10px 12px; font-size: .95rem; min-width: 160px;
    }
    button {
      background: #238636; color: #fff; border: 0; border-radius: 8px;
      padding: 11px 22px; font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #2ea043; }
    button:disabled { background: #30363d; cursor: not-allowed; }
    .meta { color: #8b949e; font-size: .85rem; margin: 14px 0; }
    h2 { font-size: 1.1rem; margin: 22px 0 10px; color: #c9d1d9; }
    .combine, .matchcard {
      background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      padding: 16px 18px; margin-bottom: 14px;
    }
    .combine-head {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
      border-bottom: 1px solid #30363d; padding-bottom: 10px;
    }
    .combine-head .num { font-weight: 700; font-size: 1.1rem; }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge { font-size: .8rem; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
    .badge.cote { background: #1f6feb33; color: #58a6ff; }
    .badge.proba { background: #23863633; color: #3fb950; }
    .badge.value { background: #9e6a0333; color: #e3b341; }
    .sel { display: flex; justify-content: space-between; align-items: center;
           padding: 8px 0; border-bottom: 1px dashed #21262d; gap: 12px; }
    .sel:last-child { border-bottom: 0; }
    .sel .match { font-weight: 600; }
    .sel .marche { color: #8b949e; font-size: .88rem; }
    .sel .cote { font-weight: 700; color: #58a6ff; white-space: nowrap; }
    .sel .p { font-size: .8rem; color: #3fb950; }
    .matchcard .mhead { display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; }
    .matchcard .mname { font-weight:600; }
    .matchcard .minfo { color:#8b949e; font-size:.82rem; }
    .vide, .erreur { background: #161b22; border: 1px solid #30363d;
            border-radius: 12px; padding: 20px; color: #8b949e; }
    .erreur { color: #f85149; border-color: #f8514955; }
    .warn { font-size: .8rem; color: #e3b341; margin-top: 18px;
            background: #9e6a0322; padding: 10px 14px; border-radius: 8px; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff5;
            border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
            vertical-align: -3px; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>🎯 BET — Générateur de tickets</h1>
  <p class="sub">Scan automatique de tous les matchs jouables sur Mise-o-jeu — Poisson + value</p>

  <div class="controls">
    <button id="btn" onclick="generer()">⚡ Générer les tickets</button>
    <div class="field">
      <label for="nb">Nombre de tickets</label>
      <select id="nb"><option>3</option><option>5</option><option>1</option></select>
    </div>
  </div>

  <div class="meta" id="meta"></div>
  <div id="resultats"></div>

  <p class="warn">⚠️ Cotes = consensus du marché (≈ Mise-o-jeu, un peu plus généreuses).
     Démo technique, pas un conseil de pari. Backtester avant tout usage réel.</p>

  <script>
    async function generer() {
      const btn = document.getElementById("btn");
      const meta = document.getElementById("meta");
      const box = document.getElementById("resultats");
      const nb = document.getElementById("nb").value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Scan en cours…';
      box.innerHTML = ""; meta.textContent = "";

      try {
        const url = `/api/generer?nb_tickets=${nb}`;
        const data = await (await fetch(url)).json();

        if (data.erreur) {
          box.innerHTML = `<div class="erreur">Erreur : ${data.erreur}</div>`;
          return;
        }

        meta.textContent =
          `Scan auto : ${(data.dates_scannees || []).join(", ")} • ` +
          `${data.nb_matchs_analyses} matchs jouables • ` +
          `${data.nb_combines} tickets`;

        let html = "";

        if (!data.combines || data.combines.length === 0) {
          html += `<div class="vide">Aucun match des championnats Mise-o-jeu
            dans la fenêtre accessible (creux de juin + clé gratuite limitée à J±1).
            Le scan se remplira tout seul dès que ces championnats jouent
            (ou avec une clé prod).</div>`;
        } else {
          html += "<h2>🎫 Tickets proposés</h2>";
          html += data.combines.map((c, i) => {
            const sels = c.selections.map(s => `
              <div class="sel">
                <div><div class="match">${s.match}</div>
                     <div class="marche">🏆 ${s.ligue || "?"} · ${s.marche}</div></div>
                <div style="text-align:right">
                  <div class="cote">@ ${s.cote.toFixed(2)}</div>
                  <div class="p">proba ${Math.round(s.proba * 100)}%</div></div>
              </div>`).join("");
            return `<div class="combine">
                <div class="combine-head">
                  <span class="num">Ticket #${i + 1}</span>
                  <div class="badges">
                    <span class="badge cote">Cote ${c.cote_totale.toFixed(2)}</span>
                    <span class="badge proba">Proba ${(c.proba_reussite * 100).toFixed(1)}%</span>
                    <span class="badge value">Value ${c.value >= 0 ? "+" : ""}${(c.value * 100).toFixed(0)}%</span>
                  </div>
                </div>${sels}</div>`;
          }).join("");
        }

        // Détail des matchs analysés (proba, buts attendus, forme)
        if (data.analyses && data.analyses.length) {
          html += "<h2>📊 Analyse des matchs</h2>";
          html += data.analyses.map(a => `
            <div class="matchcard">
              <div class="mhead">
                <span class="mname">🏆 ${a.ligue || "?"} — ${a.match}</span>
                <span class="minfo">buts attendus ${a.buts_attendus.domicile} - ${a.buts_attendus.exterieur}
                   • forme ${a.forme.domicile} / ${a.forme.exterieur}</span>
              </div>
            </div>`).join("");
        }

        box.innerHTML = html;
      } catch (e) {
        box.innerHTML = `<div class="erreur">Erreur réseau : ${e.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = "⚡ Générer les tickets";
      }
    }
  </script>
</body>
</html>
